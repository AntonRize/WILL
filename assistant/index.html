<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    const {useState, useEffect, useRef} = React;
    const REPO_BASE = 'https://raw.githubusercontent.com/AntonRize/WILL/main/';
    const FILES = [
        'WILL DATABASE/WILL_RG_I.txt',
        'WILL DATABASE/R.O.M..txt',
        'WILL DATABASE/WILL_RG_II.txt',
        'WILL DATABASE/WILL_RG_III.txt',
    ];
    const CORE = `β (beta)=v/c · κ (kappa)=vₑ/c · κ²=2β²`;
    const PROXY = 'https://proxy-flame-seven.vercel.app/api/gemini';
    const LOG_API = 'https://proxy-flame-seven.vercel.app/api/save_log';

    // Model registry. selectedModel keys map to: the proxy token (forceModel),
    // the button label, and the "powered by" indicator line.
    // forceModel === null  -> proxy default path (Gemini, with Nemotron fallback)
    // forceModel === 'nemotron' -> proxy manual path (Nemotron streaming)
    const MODELS = {
        gemini:   { label: 'Gemini 2.5 Flash', force: null,        info: 'Powered by Gemini 2.5 Flash' },
        nemotron: { label: 'Nemotron 550B',    force: 'nemotron',  info: 'Powered by Nemotron 550B' }
    };

    const QUICK = {
        'beta':  'β (beta) is the kinematic projection $v / c$. Together with κ it obeys $\\kappa^2 = 2 \\beta^2$.',
        'β':     'β (beta) is the kinematic projection $v / c$. Together with κ it obeys $\\kappa^2 = 2 \\beta^2$.',
        'kappa': 'κ (kappa) is the gravitational projection $v_e / c$. Relation $\\kappa^2 = 2 \\beta^2$.',
        'κ':     'κ (kappa) is the gravitational projection $v_e / c$. Relation $\\kappa^2 = 2 \\beta^2$.'
    };

    function renderMarkdownWithLatex(text) {
        const placeholders = [];
        let idx = 0;
        text = text.replace(/\$\$([\s\S]*?)\$\$/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });
        text = text.replace(/\$([^\$\n]+?)\$/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });
        text = text.replace(/\\\[([\s\S]*?)\\\]/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });
        text = text.replace(/\\\(([\s\S]*?)\\\)/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });

        let html = marked.parse(text);
        html = html.replace(/<a /g, '<a target="_blank" rel="noopener noreferrer" ');

        for (const {ph, val} of placeholders) {
            html = html.replace(ph, val);
        }
        return html;
    }

    function typesetMath() {
        if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.startup && MathJax.startup.document) {
                MathJax.startup.document.clear();
                MathJax.startup.document.updateDocument();
            }
            MathJax.typesetPromise().catch(function(err) {
                console.warn('MathJax typeset error:', err);
            });
        }
    }

    function loadKB(){
        return Promise.all(FILES.map(p=>fetch(REPO_BASE+p).then(r=>{
            if(!r.ok)throw new Error('KB fetch '+r.status);
            return r.text();
        }).then(text => `<SOURCE_DOCUMENT: ${p}>\n${text}\n</SOURCE_DOCUMENT>`)
        )).then(t=>t.join('\n\n'));
    }

    function loadSystemPrompt(){
        return fetch(REPO_BASE+'assistant/SYSTEM_PROMPT.txt').then(r=>{
            if(!r.ok)throw new Error('Prompt fetch '+r.status);
            return r.text();
        });
    }

    /* ── Unified model call ──
       The proxy can answer in TWO shapes for the SAME endpoint:
         • application/json            -> Gemini (non-streaming) -> { reply, ... }
         • text/event-stream (SSE)     -> Nemotron via OpenRouter (streaming)
       We detect the shape from Content-Type and handle both. For the streaming
       shape we parse OpenRouter chunks, separating reasoning tokens from answer
       tokens, and invoke callbacks so the UI can update live. */
    async function askModel(prompt, forceModel, handlers) {
        handlers = handlers || {};
        const onText = handlers.onText || function(){};
        const onReasoning = handlers.onReasoning || function(){};

        const body = { prompt };
        if (forceModel) body.forceModel = forceModel;

        const res = await fetch(PROXY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        const ct = (res.headers.get('content-type') || '').toLowerCase();

        // ---- Non-streaming JSON path (Gemini, or any JSON error envelope) ----
        if (ct.indexOf('text/event-stream') === -1) {
            const t = await res.text();
            let d;
            try { d = JSON.parse(t); }
            catch (e) { throw new Error(t || ('HTTP ' + res.status)); }
            if (d.error) {
                throw new Error(typeof d.error === 'string' ? d.error : JSON.stringify(d.error));
            }
            if (typeof d.reply !== 'string') {
                throw new Error('Malformed proxy response (no reply).');
            }
            return { text: d.reply, reasoning: '' };
        }

        // ---- Streaming SSE path (OpenRouter chunks forwarded by the proxy) ----
        if (!res.ok) {
            const t = await res.text().catch(function(){ return ''; });
            throw new Error(t || ('HTTP ' + res.status));
        }
        if (!res.body || !res.body.getReader) {
            throw new Error('Streaming not supported by this browser.');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let text = '';
        let reasoning = '';

        // Pull one reasoning delta out of an OpenRouter delta object.
        function extractReasoning(delta) {
            let r = '';
            if (typeof delta.reasoning === 'string') r += delta.reasoning;
            if (Array.isArray(delta.reasoning_details)) {
                for (const rd of delta.reasoning_details) {
                    if (rd && typeof rd.text === 'string') r += rd.text;
                    else if (rd && typeof rd.content === 'string') r += rd.content;
                }
            }
            return r;
        }

        // Handle one complete SSE line. Returns true when [DONE] is seen.
        function handleLine(rawLine) {
            const line = rawLine.replace(/\r$/, '').trim();
            if (!line || line.charAt(0) === ':') return false;   // blank or keepalive comment
            if (line.indexOf('data:') !== 0) return false;
            const dataStr = line.slice(5).trim();
            if (dataStr === '[DONE]') return true;
            let json;
            try { json = JSON.parse(dataStr); }
            catch (e) { return false; }                          // ignore non-JSON / partials
            if (json.error) {
                const m = typeof json.error === 'string'
                    ? json.error
                    : (json.error.message || JSON.stringify(json.error));
                throw new Error(m);
            }
            const choice = json.choices && json.choices[0];
            const delta = (choice && choice.delta) || {};
            const r = extractReasoning(delta);
            if (r) { reasoning += r; onReasoning(reasoning); }
            if (typeof delta.content === 'string' && delta.content) {
                text += delta.content; onText(text);
            }
            return false;
        }

        let done = false;
        while (!done) {
            const chunk = await reader.read();
            if (chunk.done) break;
            buffer += decoder.decode(chunk.value, { stream: true });
            let nl;
            while ((nl = buffer.indexOf('\n')) !== -1) {
                const line = buffer.slice(0, nl);
                buffer = buffer.slice(nl + 1);
                if (handleLine(line)) { done = true; break; }
            }
        }
        // Flush any trailing line with no final newline.
        if (!done && buffer) handleLine(buffer);

        return { text: text, reasoning: reasoning };
    }

    const isRu=s=>/[Ѐ-ӿ]/i.test(s);

    /* Collapsible "Thinking" disclosure for reasoning tokens. */
    function ReasoningPanel(props) {
        if (!props.text) return null;
        return React.createElement('details', {
                className: 'reasoning-panel',
                open: !!props.open
            },
            React.createElement('summary', null, props.streaming ? 'Thinking…' : 'Show reasoning'),
            React.createElement('div', { className: 'reasoning-content' }, props.text)
        );
    }

    function App(){
        const [kb,setKb]=useState('');
        const [sysPrompt,setSysPrompt]=useState('');
        const [ks,setKs]=useState('loading');
        const [engagementLevel, setEngagementLevel] = useState(null);
        const [selectedModel, setSelectedModel] = useState('gemini'); // 'gemini' | 'nemotron'
        const [streaming, setStreaming] = useState(null); // {text, reasoning} while a stream is live

        const sessionIdRef = useRef(new Date().toISOString().replace(/[:.]/g, '-'));
        const sessionNamedRef = useRef(false);

        const welcome={
            id:0,
            txt:renderMarkdownWithLatex("**Hi! I am WILL AI**\n\nTo begin, please select your preferred mathematical engagement level:"),
            user:false,
            isWelcome:true,
            raw:"Initial Welcome"
        };

        const [log,setLog]=useState([welcome]);
        const logRef=useRef([welcome]);
        const [inp,setInp]=useState('');
        const [busy,setBusy]=useState(false);
        const endRef=useRef(null);
        const textRef=useRef(null);

        useEffect(()=>{
            Promise.all([loadKB(), loadSystemPrompt()])
                .then(([kbData, promptData])=>{
                    setKb(kbData);
                    setSysPrompt(promptData);
                    setKs('ok');
                })
                .catch(()=>setKs('error'));
        },[]);

        // Typeset math whenever a COMMITTED message is added (not on every stream token).
        useEffect(()=>{
            endRef.current?.scrollIntoView({behavior:'smooth'});
            typesetMath();
        },[log]);

        // While streaming, keep the view pinned to the bottom but DON'T re-run MathJax
        // on every token (too expensive); LaTeX is typeset once the message commits.
        useEffect(()=>{
            if (streaming) endRef.current?.scrollIntoView({behavior:'smooth'});
        },[streaming]);

        const push=(txt,user=false,raw=txt,modelInfo=null,reasoning='')=>{
            const content=user?txt:renderMarkdownWithLatex(txt);
            const entry={id:Date.now()+Math.random(),txt:content,user,raw,modelInfo,reasoning};
            logRef.current=[...logRef.current,entry];
            setLog(logRef.current);
        };

        const handleLevelSelection = (level) => {
            setEngagementLevel(level);
            push(level, true, level);
            push(`Confirmed. Mathematical engagement level set to **${level}**. How can I assist you with WILL Relational Geometry?`, false);
        };

        function sendLog(){
            const payload = {
                sessionId: sessionIdRef.current,
                log: logRef.current.map(m=>({user:m.user, raw:m.raw, isWelcome:!!m.isWelcome}))
            };
            fetch(LOG_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(()=>{});
        }

        useEffect(()=>{
            const onUnload = () => {
                const msgs = logRef.current.filter(m=>!m.isWelcome);
                if(msgs.length === 0) return;
                const payload = {
                    sessionId: sessionIdRef.current,
                    log: logRef.current.map(m=>({user:m.user, raw:m.raw, isWelcome:!!m.isWelcome}))
                };
                navigator.sendBeacon(LOG_API, new Blob([JSON.stringify(payload)],{type:'application/json'}));
            };
            window.addEventListener('beforeunload', onUnload);
            return ()=> window.removeEventListener('beforeunload', onUnload);
        },[]);

        async function send() {
            const q = inp.trim();
            if (!q || busy || !engagementLevel) return;

            if (!sessionNamedRef.current) {
                const slug = q.slice(0, 30).trim().replace(/[^a-zA-Z0-9а-яА-ЯёЁ]/g, '_').replace(/_+/g, '_');
                sessionIdRef.current = `${sessionIdRef.current}_${slug}`;
                sessionNamedRef.current = true;
            }

            push(q, true, q);
            setInp('');
            if (textRef.current) textRef.current.style.height = 'auto';

            const qKey = q.toLowerCase().replace('?', '');
            if (QUICK[qKey]) {
                push(QUICK[qKey], false, QUICK[qKey]);
                sendLog();
                return;
            }

            if (ks !== 'ok') {
                const msg = 'Knowledge base still loading…';
                push(msg, false, msg);
                sendLog();
                return;
            }

            setBusy(true);
            setStreaming(null);
            const lang = isRu(q) ? 'Russian' : 'English';

            const model = MODELS[selectedModel] || MODELS.gemini;
            const forceModel = model.force;
            const modelInfo = model.info;

            // Mutable accumulator so onText / onReasoning don't clobber each other.
            const streamId = Date.now() + Math.random();
            const acc = { text: '', reasoning: '' };

            try {
                const conversation = logRef.current.filter(m => !m.isWelcome).map(m => `${m.user ? 'User' : 'Assistant'}: ${m.raw}`).join('\n');

                const fullPrompt = `${sysPrompt}

<USER_PROFILE>
User Engagement Level: ${engagementLevel}
Adapt your tone and mathematical rigor accordingly.
</USER_PROFILE>

<KNOWLEDGE_BASE>
${kb}
</KNOWLEDGE_BASE>
<CONVERSATION_HISTORY>
${conversation}
</CONVERSATION_HISTORY>

Answer in ${lang}. Use Markdown. Follow the <CITATION_PROTOCOL> strictly for all references. The user's question is below.
<USER_QUESTION>
${q}
</USER_QUESTION>`;

                const result = await askModel(fullPrompt, forceModel, {
                    onText: (t) => { acc.text = t; setStreaming({ id: streamId, text: acc.text, reasoning: acc.reasoning }); },
                    onReasoning: (r) => { acc.reasoning = r; setStreaming({ id: streamId, text: acc.text, reasoning: acc.reasoning }); }
                });

                setStreaming(null);
                const finalText = (result.text && result.text.trim()) ? result.text : '*(No text received from the model — it may be busy or unavailable. Try again, or switch model.)*';
                push(finalText, false, result.text || '', modelInfo, result.reasoning || '');
                sendLog();

            } catch (e) {
                setStreaming(null);
                // Show the real, raw error — no friendly rewriting.
                const errorMessage = String(e.message || 'Unknown error');
                push('**Error:** ' + errorMessage, false, errorMessage);
                sendLog();
            }
            setBusy(false);
        }

        /* ── Render ── */
        return React.createElement('div',{className:'flex flex-col h-full'},

            ks!=='ok' && React.createElement('div',{className:'text-center text-xs text-yellow-400 py-1 flex-shrink-0'},
                ks==='loading'?'Knowledge base loading…':'KB error (check console)'
            ),

            React.createElement('div',{className:'flex-1 min-h-0 overflow-y-auto px-4 md:px-8 lg:px-16 py-4'},
                React.createElement('div',{className:'max-w-4xl mx-auto space-y-4'},
                    log.map(m=>React.createElement('div',{key:m.id,className:`flex ${m.user?'justify-end':'justify-start'}`},
                        m.user?
                        React.createElement('div',{
                            className:'max-w-[85%] p-3 rounded-2xl bg-cyan-700 text-white',
                            style:{whiteSpace:'pre-wrap'}
                        },m.txt)
                        :
                        React.createElement('div',{className:'max-w-[85%]'},
                            React.createElement(ReasoningPanel,{text:m.reasoning,streaming:false,open:false}),
                            React.createElement('div',{
                                className:`ai-message-bubble p-4 rounded-2xl bg-slate-700/80 text-slate-100 ${m.isWelcome?'border border-cyan-500/40':''}`,
                                dangerouslySetInnerHTML:{__html:m.txt}
                            }),
                            m.modelInfo && React.createElement('div',{className:'model-indicator'}, m.modelInfo)
                        )
                    )),

                    /* Live streaming bubble (Nemotron tokens as they arrive) */
                    streaming && React.createElement('div',{className:'flex justify-start'},
                        React.createElement('div',{className:'max-w-[85%]'},
                            React.createElement(ReasoningPanel,{text:streaming.reasoning,streaming:true,open:true}),
                            React.createElement('div',{
                                className:'ai-message-bubble p-4 rounded-2xl bg-slate-700/80 text-slate-100',
                                dangerouslySetInnerHTML:{__html: renderMarkdownWithLatex(streaming.text || '') }
                            }),
                            React.createElement('span',{className:'stream-caret'})
                        )
                    ),

                    /* Waiting indicator: shown only before the first token arrives */
                    busy && !streaming && React.createElement('div',{className:'flex justify-start'},
                        React.createElement('div',{className:'p-4 rounded-2xl bg-slate-700/80 text-slate-300'},
                            React.createElement('span',{className:'inline-flex gap-1'},
                                React.createElement('span',{className:'animate-bounce',style:{animationDelay:'0ms'}},'·'),
                                React.createElement('span',{className:'animate-bounce',style:{animationDelay:'150ms'}},'·'),
                                React.createElement('span',{className:'animate-bounce',style:{animationDelay:'300ms'}},'·')
                            )
                        )
                    ),
                    React.createElement('div',{ref:endRef})
                )
            ),

            React.createElement('div',{className:'flex-shrink-0 border-t border-slate-700/50 bg-gray-900/80 backdrop-blur-sm px-4 md:px-8 lg:px-16 py-3'},
                !engagementLevel ?
                React.createElement('div', {className: 'max-w-4xl mx-auto flex flex-col items-center justify-center gap-3 py-2'},
                    React.createElement('div', {className: 'text-slate-300 text-sm font-semibold'}, 'Select Mathematical Engagement Level:'),
                    React.createElement('div', {className: 'flex flex-wrap justify-center gap-3'},
                        React.createElement('button', {onClick: () => handleLevelSelection('Humble thinker'), className: 'px-4 py-2 bg-indigo-900/50 hover:bg-indigo-800 text-indigo-200 rounded-lg border border-indigo-700 transition'}, 'Humble thinker'),
                        React.createElement('button', {onClick: () => handleLevelSelection('Curious student'), className: 'px-4 py-2 bg-cyan-900/50 hover:bg-cyan-800 text-cyan-200 rounded-lg border border-cyan-700 transition'}, 'Curious student'),
                        React.createElement('button', {onClick: () => handleLevelSelection('Rigorous physicist'), className: 'px-4 py-2 bg-emerald-900/50 hover:bg-emerald-800 text-emerald-200 rounded-lg border border-emerald-700 transition'}, 'Rigorous physicist')
                    )
                )
                :
                React.createElement('div',{className:'max-w-4xl mx-auto'},
                    React.createElement('div',{className:'model-switcher'},
                        React.createElement('button',{
                            onClick: () => setSelectedModel('gemini'),
                            className: `model-btn ${selectedModel === 'gemini' ? 'active' : ''}`
                        }, MODELS.gemini.label),
                        React.createElement('button',{
                            onClick: () => setSelectedModel('nemotron'),
                            className: `model-btn ${selectedModel === 'nemotron' ? 'active' : ''}`
                        }, MODELS.nemotron.label)
                    ),
                    React.createElement('div',{className:'flex gap-2 items-end'},
                        React.createElement('textarea',{
                            id:'will-ai-input',
                            name:'will-ai-input',
                            ref:textRef,
                            className:'flex-1 resize-none bg-slate-800 text-slate-50 text-[16px] rounded-xl p-3 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 max-h-40',
                            rows:1,value:inp,placeholder:`Ask about WILL Geometry (${engagementLevel})…`,
                            onInput:e=>{setInp(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,160)+'px';},
                            onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
                        }),
                        React.createElement('button',{
                            className:'px-5 py-3 shrink-0 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl font-medium transition-colors disabled:opacity-40 disabled:hover:bg-cyan-600',
                            disabled:!inp.trim()||busy,onClick:send
                        },'Send')
                    )
                )
            )
        );
    }

    /* ── Error boundary ──
       A render-time exception must never leave the page blank again: show a
       readable message (and log to console) instead of an empty #root. */
    class ErrorBoundary extends React.Component {
        constructor(props){ super(props); this.state = { err: null }; }
        static getDerivedStateFromError(err){ return { err }; }
        componentDidCatch(err, info){ console.error('WILL-AI render error:', err, info); }
        render(){
            if (this.state.err) {
                return React.createElement('div',{
                    style:{padding:'24px',color:'#fca5a5',fontFamily:'monospace',whiteSpace:'pre-wrap',lineHeight:1.5}
                },
                'WILL-AI failed to render:\n' + (this.state.err.message || String(this.state.err)) +
                '\n\nPlease reload the page. If this keeps happening, email antonrize@willrg.com.');
            }
            return this.props.children;
        }
    }

    (function mount(){
        const rootEl = document.getElementById('root');
        if (!rootEl) return;
        if (!window.React || !window.ReactDOM || !window.marked) {
            rootEl.innerHTML = '<div style="padding:24px;color:#fca5a5;font-family:monospace">'
                + 'Failed to load required libraries (React / marked) from the CDN.<br>'
                + 'Please check your connection and reload the page.</div>';
            return;
        }
        ReactDOM.createRoot(rootEl).render(
            React.createElement(ErrorBoundary, null, React.createElement(App))
        );
    })();
</script>
