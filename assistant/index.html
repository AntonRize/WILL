title: "WILL-AI"
permalink: /will-ai/
redirect_from: /WILL-AI/
description: " Interactive AI chat for physics research. Ask WILL-AI about Relational Geometry, unified physics, cosmology, and quantum mechanics."
---

<div id="root" class="h-full"></div>

<style>
    textarea::-webkit-scrollbar{
        width:4px
    }
    .ai-message-bubble p {
        margin-bottom: 1em;
    }
    .ai-message-bubble p:last-child {
        margin-bottom: 0;
    }
    .ai-message-bubble mjx-container[jax="CHTML"][display="true"] {
        display: block;
        overflow-x: auto;
        overflow-y: hidden;
        max-width: 100%;
        margin: 0.8em 0;
    }
    .ai-message-bubble mjx-container {
        color: inherit !important;
    }
    .level-btn {
        transition: all 0.2s;
        border: 1px solid rgba(6, 182, 212, 0.3);
    }
    .level-btn:hover {
        background-color: rgba(6, 182, 212, 0.1);
        border-color: rgba(6, 182, 212, 1);
        transform: translateY(-2px);
    }
    .ai-message-bubble a {
        color: #22d3ee;
        text-decoration: underline;
        text-underline-offset: 3px;
        font-weight: 500;
        transition: color 0.2s;
    }
    .ai-message-bubble a:hover {
        color: #a5f3fc;
    }

    /* Model switcher styles */
    .model-switcher {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
        flex-wrap: wrap;
    }
    .model-btn {
        padding: 8px 18px;
        border: 2px solid #334155;
        background: #1e2937;
        color: #94a3b8;
        border-radius: 9999px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.2s;
    }
    .model-btn.active {
        background: #22d3ee;
        color: #0f172a;
        border-color: #22d3ee;
        font-weight: 600;
    }
    .model-indicator {
        font-size: 0.75rem;
        color: #64748b;
        margin-top: 6px;
        text-align: right;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
    const {useState, useEffect, useRef} = React;
    const REPO_BASE = 'https://raw.githubusercontent.com/AntonRize/WILL/main/';
    const FILES = [
        'WILL DATABASE/WILL_RG_I.txt',
        'WILL DATABASE/R.O.M..txt',
        'WILL DATABASE/WILL_RG_II.txt',
        'WILL DATABASE/WILL_RG_III.txt',
    ];
    const CORE = `β (beta)=v/c · κ (kappa)=vₑ/c · κ²=2β²`;
    const PROXY = 'https://proxy-flame-seven.vercel.app/api/gemini';
    const LOG_API = 'https://proxy-flame-seven.vercel.app/api/save_log';
    const QUICK = {
        'beta':  'β (beta) is the kinematic projection $v / c$. Together with κ it obeys $\\kappa^2 = 2 \\beta^2$.',
        'β':     'β (beta) is the kinematic projection $v / c$. Together with κ it obeys $\\kappa^2 = 2 \\beta^2$.',
        'kappa': 'κ (kappa) is the gravitational projection $v_e / c$. Relation $\\kappa^2 = 2 \\beta^2$.',
        'κ':     'κ (kappa) is the gravitational projection $v_e / c$. Relation $\\kappa^2 = 2 \\beta^2$.'
    };

    function renderMarkdownWithLatex(text) {
        const placeholders = [];
        let idx = 0;
        text = text.replace(/\$\$([\s\S]*?)\$\$/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });
        text = text.replace(/\$([^\$\n]+?)\$/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });
        text = text.replace(/\\\[([\s\S]*?)\\\]/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });
        text = text.replace(/\\\(([\s\S]*?)\\\)/g, function(m) {
            const ph = '\x00MATH' + (idx++) + '\x00';
            placeholders.push({ph, val: m});
            return ph;
        });

        let html = marked.parse(text);
        html = html.replace(/<a /g, '<a target="_blank" rel="noopener noreferrer" ');

        for (const {ph, val} of placeholders) {
            html = html.replace(ph, val);
        }
        return html;
    }

    function typesetMath() {
        if (window.MathJax && MathJax.typesetPromise) {
            if (MathJax.startup && MathJax.startup.document) {
                MathJax.startup.document.clear();
                MathJax.startup.document.updateDocument();
            }
            MathJax.typesetPromise().catch(function(err) {
                console.warn('MathJax typeset error:', err);
            });
        }
    }

    function loadKB(){
        return Promise.all(FILES.map(p=>fetch(REPO_BASE+p).then(r=>{
            if(!r.ok)throw new Error('KB fetch '+r.status);
            return r.text();
        }).then(text => `<SOURCE_DOCUMENT: ${p}>\n${text}\n</SOURCE_DOCUMENT>`)
        )).then(t=>t.join('\n\n'));
    }

    function loadSystemPrompt(){
        return fetch(REPO_BASE+'assistant/SYSTEM_PROMPT.txt').then(r=>{
            if(!r.ok)throw new Error('Prompt fetch '+r.status);
            return r.text();
        });
    }

    // Streaming following OpenRouter docs pattern as closely as possible
    async function askNemotronStream(prompt, onChunk) {
        const response = await fetch(PROXY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                prompt: prompt,
                forceModel: 'qwen3.6'
            })
        });

        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(errorText);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunkText = decoder.decode(value, { stream: true });

            // Parse SSE format
            const lines = chunkText.split('\n');
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const dataStr = line.slice(6).trim();
                    if (dataStr === '[DONE]') continue;
                    if (!dataStr) continue;

                    try {
                        const data = JSON.parse(dataStr);

                        // Exact pattern from docs
                        const content = data.choices?.[0]?.delta?.content || '';
                        if (content) {
                            fullText += content;
                            onChunk(content);
                        }

                        // Capture reasoning tokens from final chunk (as per docs)
                        if (data.usage?.reasoningTokens) {
                            console.log('Reasoning tokens used:', data.usage.reasoningTokens);
                        }
                    } catch (e) {
                        // Ignore parse errors on partial chunks
                        continue;
                    }
                }
            }
        }

        return fullText;
    }

    // Simple non-streaming for Gemini
    async function askGemini(prompt) {
        const res = await fetch(PROXY, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ prompt })
        });
        if (!res.ok) {
            const txt = await res.text();
            throw new Error(txt);
        }
        const data = await res.json();
        return data.reply || '';
    }

    const isRu = s => /[\u0400-\u04FF]/i.test(s);

    function App() {
        const [kb, setKb] = useState('');
        const [sysPrompt, setSysPrompt] = useState('');
        const [ks, setKs] = useState('loading');
        const [engagementLevel, setEngagementLevel] = useState(null);
        const [selectedModel, setSelectedModel] = useState('gemini');

        const sessionIdRef = useRef(new Date().toISOString().replace(/[:.]/g, '-'));
        const sessionNamedRef = useRef(false);

        const welcome = {
            id: 0,
            txt: renderMarkdownWithLatex("**Hi! I am WILL AI**\n\nTo begin, please select your preferred mathematical engagement level:"),
            user: false,
            isWelcome: true,
            raw: "Initial Welcome"
        };

        const [log, setLog] = useState([welcome]);
        const logRef = useRef([welcome]);
        const [inp, setInp] = useState('');
        const [busy, setBusy] = useState(false);
        const endRef = useRef(null);
        const textRef = useRef(null);

        useEffect(() => {
            Promise.all([loadKB(), loadSystemPrompt()])
                .then(([kbData, promptData]) => {
                    setKb(kbData);
                    setSysPrompt(promptData);
                    setKs('ok');
                })
                .catch(() => setKs('error'));
        }, []);

        useEffect(() => {
            endRef.current?.scrollIntoView({ behavior: 'smooth' });
            typesetMath();
        }, [log]);

        const push = (txt, user = false, raw = txt, modelInfo = null) => {
            const content = user ? txt : renderMarkdownWithLatex(txt);
            const entry = { id: Date.now() + Math.random(), txt: content, user, raw, modelInfo };
            logRef.current = [...logRef.current, entry];
            setLog(logRef.current);
            return entry.id;
        };

        const updateMessage = (id, newTxt) => {
            logRef.current = logRef.current.map(m =>
                m.id === id ? { ...m, txt: renderMarkdownWithLatex(newTxt), raw: newTxt } : m
            );
            setLog([...logRef.current]);
        };

        const handleLevelSelection = (level) => {
            setEngagementLevel(level);
            push(level, true, level);
            push(`Confirmed. Mathematical engagement level set to **${level}**. How can I assist you with WILL Relational Geometry?`, false);
        };

        function sendLog() {
            const payload = {
                sessionId: sessionIdRef.current,
                log: logRef.current.map(m => ({ user: m.user, raw: m.raw, isWelcome: !!m.isWelcome }))
            };
            fetch(LOG_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(() => {});
        }

        useEffect(() => {
            const onUnload = () => {
                const msgs = logRef.current.filter(m => !m.isWelcome);
                if (msgs.length === 0) return;
                const payload = {
                    sessionId: sessionIdRef.current,
                    log: logRef.current.map(m => ({ user: m.user, raw: m.raw, isWelcome: !!m.isWelcome }))
                };
                navigator.sendBeacon(LOG_API, new Blob([JSON.stringify(payload)], { type: 'application/json' }));
            };
            window.addEventListener('beforeunload', onUnload);
            return () => window.removeEventListener('beforeunload', onUnload);
        }, []);

        async function send() {
            const q = inp.trim();
            if (!q || busy || !engagementLevel) return;

            if (!sessionNamedRef.current) {
                const slug = q.slice(0, 30).trim().replace(/[^a-zA-Z0-9а-яА-ЯёЁ]/g, '_').replace(/_+/g, '_');
                sessionIdRef.current = `${sessionIdRef.current}_${slug}`;
                sessionNamedRef.current = true;
            }

            push(q, true, q);
            setInp('');
            if (textRef.current) textRef.current.style.height = 'auto';

            const qKey = q.toLowerCase().replace('?', '');
            if (QUICK[qKey]) {
                push(QUICK[qKey], false, QUICK[qKey]);
                sendLog();
                return;
            }

            if (ks !== 'ok') {
                const msg = 'Knowledge base still loading…';
                push(msg, false, msg);
                sendLog();
                return;
            }

            setBusy(true);
            const lang = isRu(q) ? 'Russian' : 'English';

            const isNemotron = selectedModel === 'minimax';
            const modelLabel = isNemotron ? 'Nemotron 550B (reasoning)' : 'Gemini 2.5 Flash';
            const aiMessageId = push('', false, '', modelLabel);

            try {
                const conversation = logRef.current.filter(m => !m.isWelcome).map(m => `${m.user ? 'User' : 'Assistant'}: ${m.raw}`).join('\n');

                const fullPrompt = `${sysPrompt}

<USER_PROFILE>
User Engagement Level: ${engagementLevel}
Adapt your tone and mathematical rigor accordingly.
</USER_PROFILE>

<KNOWLEDGE_BASE>
${kb}
</KNOWLEDGE_BASE>
<CONVERSATION_HISTORY>
${conversation}
</CONVERSATION_HISTORY>

Answer in ${lang}. Use Markdown. Follow the <CITATION_PROTOCOL> strictly for all references. The user's question is below.
<USER_QUESTION>
${q}
</USER_QUESTION>`;

                if (isNemotron) {
                    // Nemotron - following OpenRouter docs pattern
                    await askNemotronStream(fullPrompt, (chunk) => {
                        updateMessage(aiMessageId, accumulatedText + chunk); // Note: accumulatedText needs to be managed
                    });
                } else {
                    // Gemini - simple non-streaming
                    const ans = await askGemini(fullPrompt);
                    updateMessage(aiMessageId, ans);
                }

                sendLog();

            } catch (e) {
                let friendlyError = String(e.message || 'Unknown error');
                updateMessage(aiMessageId, friendlyError);
                sendLog();
            }
            setBusy(false);
        }

        /* ── Render ── */
        return React.createElement('div',{className:'flex flex-col h-full'},

            ks!=='ok' && React.createElement('div',{className:'text-center text-xs text-yellow-400 py-1 flex-shrink-0'},
                ks==='loading'?'Knowledge base loading…':'KB error (check console)'
            ),

            React.createElement('div',{className:'flex-1 min-h-0 overflow-y-auto px-4 md:px-8 lg:px-16 py-4'},
                React.createElement('div',{className:'max-w-4xl mx-auto space-y-4'},
                    log.map(m=>React.createElement('div',{key:m.id,className:`flex ${m.user?'justify-end':'justify-start'}`},
                        m.user?
                        React.createElement('div',{
                            className:'max-w-[85%] p-3 rounded-2xl bg-cyan-700 text-white',
                            style:{whiteSpace:'pre-wrap'}
                        },m.txt)
                        :
                        React.createElement('div',{className:'max-w-[85%]'},
                            React.createElement('div',{
                                className:`ai-message-bubble p-4 rounded-2xl bg-slate-700/80 text-slate-100 ${m.isWelcome?'border border-cyan-500/40':''}`,
                                dangerouslySetInnerHTML:{__html:m.txt}
                            }),
                            m.modelInfo && React.createElement('div',{className:'model-indicator'}, m.modelInfo)
                        )
                    )),
                    busy&&React.createElement('div',{className:'flex justify-start'},
                        React.createElement('div',{className:'p-4 rounded-2xl bg-slate-700/80 text-slate-300'},
                            React.createElement('span',{className:'inline-flex gap-1'},
                                React.createElement('span',{className:'animate-bounce',style:{animationDelay:'0ms'}},'·'),
                                React.createElement('span',{className:'animate-bounce',style:{animationDelay:'150ms'}},'·'),
                                React.createElement('span',{className:'animate-bounce',style:{animationDelay:'300ms'}},'·')
                            )
                        )
                    ),
                    React.createElement('div',{ref:endRef})
                )
            ),

            React.createElement('div',{className:'flex-shrink-0 border-t border-slate-700/50 bg-gray-900/80 backdrop-blur-sm px-4 md:px-8 lg:px-16 py-3'},
                !engagementLevel ? 
                React.createElement('div', {className: 'max-w-4xl mx-auto flex flex-col items-center justify-center gap-3 py-2'},
                    React.createElement('div', {className: 'text-slate-300 text-sm font-semibold'}, 'Select Mathematical Engagement Level:'),
                    React.createElement('div', {className: 'flex flex-wrap justify-center gap-3'},
                        React.createElement('button', {onClick: () => handleLevelSelection('Humble thinker'), className: 'px-4 py-2 bg-indigo-900/50 hover:bg-indigo-800 text-indigo-200 rounded-lg border border-indigo-700 transition'}, 'Humble thinker'),
                        React.createElement('button', {onClick: () => handleLevelSelection('Curious student'), className: 'px-4 py-2 bg-cyan-900/50 hover:bg-cyan-800 text-cyan-200 rounded-lg border border-cyan-700 transition'}, 'Curious student'),
                        React.createElement('button', {onClick: () => handleLevelSelection('Rigorous physicist'), className: 'px-4 py-2 bg-emerald-900/50 hover:bg-emerald-800 text-emerald-200 rounded-lg border border-emerald-700 transition'}, 'Rigorous physicist')
                    )
                )
                :
                React.createElement('div',{className:'max-w-4xl mx-auto'},
                    React.createElement('div',{className:'model-switcher'},
                        React.createElement('button',{
                            onClick: () => setSelectedModel('gemini'),
                            className: `model-btn ${selectedModel === 'gemini' ? 'active' : ''}`
                        }, 'Gemini 2.5 Flash'),
                        React.createElement('button',{
                            onClick: () => setSelectedModel('minimax'),
                            className: `model-btn ${selectedModel === 'minimax' ? 'active' : ''}`
                        }, 'Nemotron 550B')
                    ),
                    React.createElement('div',{className:'flex gap-2 items-end'},
                        React.createElement('textarea',{
                            id:'will-ai-input',
                            name:'will-ai-input',
                            ref:textRef,
                            className:'flex-1 resize-none bg-slate-800 text-slate-50 text-[16px] rounded-xl p-3 focus:outline-none focus:ring-1 focus:ring-cyan-500/50 max-h-40',
                            rows:1,value:inp,placeholder:`Ask about WILL Geometry (${engagementLevel})…`,
                            onInput:e=>{setInp(e.target.value);e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,160)+'px';},
                            onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
                        }),
                        React.createElement('button',{
                            className:'px-5 py-3 shrink-0 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl font-medium transition-colors disabled:opacity-40 disabled:hover:bg-cyan-600',
                            disabled:!inp.trim()||busy,onClick:send
                        },'Send')
                    )
                )
            )
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
