author: "Anton Rize"
email: "antonrize@willrg.com"
baseurl: ""
url: "https://willrg.com"
lang: "en"

# Social / SEO
twitter:
  card: summary_large_image
  username: anton_rize
social:
  name: Anton Rize
  links:
