# Site settings
title: "WILL Relational Geometry"
description: "WILL Relational Geometry — a unified geometric framework for fundamental physics by Anton Rize. Derives Special and General Relativity, Cosmology, and Quantum Mechanics from a single geometric principle."
author: "Anton Rize"
email: "antonrize@willrg.com"
baseurl: ""
url: "https://willrg.com"
lang: "en"

# Social / SEO
twitter:
  card: summary
github_username: AntonRize

# Jekyll settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from 


# MathJax settings
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# Navigation
navigation:
  - title: "LOGOS MAP"
    url: /logos_map/
  - title: "Relativistic Foundations"
    url: /relativistic-foundations/
  - title: "Documents & Results"
    url: /results/
  - title: "Predictions"
    url: /predictions/
  - title: "Relational Orbital Mechanics"  
    url: /rom/
  - title: "Galactic Dynamics"
    url: /galactic_dynamics/
  - title: "WILL AI"
    url: /will-ai/
  - title: "About"
    url: /about/
  - title: "Help This Research"
    url: /help/

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - FR/
  - Holster/
  - proxy-server/
  - SPARC DATA/
  - node_modules/
  - package.json
  - package-lock.json
  - Claude_skills/
  - Pantheon_data/

# Collections for content organization
collections:
  parts:
    output: true
    permalink: /:collection/:name/
  results:
    output: true
    permalink: /:collection/:name/
  discussions:
    output: true
    permalink: /:collection/:name/
  logs:
    output: true
    permalink: /assistant/logs/:name/
