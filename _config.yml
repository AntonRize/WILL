# Jekyll settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from 


# MathJax settings
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# Navigation
