<!-- Favicon -->
<link rel="icon" type="image/png" href="{{ '/images/WILL_favicon.png' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/images/WILL_LOGO.png' | relative_url }}">

<!-- JSON-LD Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}{{ site.baseurl }}/",
      "description": "{{ site.description | strip_newlines | escape }}",
      "author": {
        "@type": "Person",
        "name": "{{ site.author }}",
        "url": "{{ site.url }}{{ site.baseurl }}/about/",
        "sameAs": [
          {% for link in site.social.links %}"{{ link }}"{% unless forloop.last %},{% endunless %}
          {% endfor %}
        ]
      },
      "publisher": {
        "@type": "Person",
        "name": "{{ site.author }}",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ site.url }}{{ site.baseurl }}/images/WILL_LOGO.png"
        }
      }
    },
    {
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ site.url }}{{ site.baseurl }}/"
        }{% if page.url != "/" %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "{{ page.title }}",
          "item": "{{ site.url }}{{ site.baseurl }}{{ page.url }}"
        }{% endif %}
      ]
    }{% if page.layout == "default" or page.layout == "decoder" %},
    {
      "@type": "ScholarlyArticle",
      "headline": "{{ page.title | escape }}",
      "description": "{{ page.description | default: site.description | strip_newlines | escape }}",
      "url": "{{ site.url }}{{ site.baseurl }}{{ page.url }}",
      "author": {
        "@type": "Person",
        "name": "{{ site.author }}"
      },
      "publisher": {
        "@type": "Person",
        "name": "{{ site.author }}"
      },
      "image": "{{ site.url }}{{ site.baseurl }}{{ page.image | default: '/images/WILL_OG.png' }}",
      "about": [
        {"@type": "Thing", "name": "Theoretical Physics"},
        {"@type": "Thing", "name": "Relational Geometry"},
        {"@type": "Thing", "name": "Unified Field Theory"}
      ],
      "isAccessibleForFree": true
    }{% endif %}
  ]
}
</script>
